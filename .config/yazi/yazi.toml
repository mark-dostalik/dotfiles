[mgr]
show_hidden = true

[preview]
max_width = 2400
max_height = 3600

[plugin]
prepend_previewers = [
  { mime = "image/tiff", run = "magick" },

]
prepend_preloaders = [
  { mime = "image/tiff", run = "magick" },
]

[opener]
pdf = [
  { run = 'open -a "Preview" "$@"', orphan = true, desc = "Preview" }
]
video = [
  { run = 'open -a "VLC" "$@"', orphan = true, desc = "VLC" }
]
text = [
  { run = '$EDITOR "$@"', block = true, desc = "$EDITOR" },
]

[open]
rules = [
  { mime = "application/json", use = "text" },
  { mime = "application/pdf", use = "pdf" },
  { mime = "text/*", use = "text" },
  { mime = "video/*", use = "video" },
]
